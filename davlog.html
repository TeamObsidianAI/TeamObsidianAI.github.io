  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n    html { scroll-behavior: smooth; }\n    body {\n      background: var(--bg);\n      color: var(--text);\n      font-family: var(--font-body);\n      -webkit-font-smoothing: antialiased;\n      overflow-x: hidden;\n      transition: background 0.4s, color 0.3s;\n    }\n    a { color: inherit; text-decoration: none; }\n\n    /* ─────────── TWEAKS PANEL ─────────── */\n    #tweaks-panel {\n      position: fixed; bottom: 24px; right: 24px;\n      width: 300px; max-height: 85vh;\n      background: rgba(10,10,12,0.97);\n      border: 1px solid rgba(255,255,255,0.1);\n      border-radius: 18px;\n      padding: 20px;\n      z-index: 9999;\n      overflow-y: auto;\n      backdrop-filter: blur(24px);\n      display: none;\n      flex-direction: column;\n      gap: 18px;\n      font-family: 'Inter', sans-serif;\n      box-shadow: 0 24px 80px rgba(0,0,0,0.6);\n    }\n    #tweaks-panel.open { display: flex; }\n    #tweaks-panel::-webkit-scrollbar { width: 4px; }\n    #tweaks-panel::-webkit-scrollbar-track { background: transparent; }\n    #tweaks-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }\n\n    .tp-header { display: flex; align-items: center; justify-content: space-between; }\n    .tp-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); }\n\n    .tp-section { display: flex; flex-direction: column; gap: 10px; }\n    .tp-section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.2); padding-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.06); }\n\n    .tp-row { display: flex; flex-direction: column; gap: 7px; }\n    .tp-row-inline { display: flex; align-items: center; justify-content: space-between; }\n    .tp-label { font-size: 12px; color: rgba(255,255,255,0.55); display: flex; justify-content: space-between; }\n    .tp-label span { color: var(--accent); font-weight: 500; font-variant-numeric: tabular-nums; }\n\n    input[type=\"range\"] {\n      width: 100%; height: 4px; accent-color: var(--accent);\n      cursor: pointer; -webkit-appearance: none; appearance: none;\n      background: rgba(255,255,255,0.1); border-radius: 4px; outline: none;\n    }\n    input[type=\"range\"]::-webkit-slider-thumb {\n      -webkit-appearance: none; width: 14px; height: 14px;\n      border-radius: 50%; background: var(--accent);\n      box-shadow: 0 0 8px var(--accent-glow); cursor: pointer;\n    }\n\n    .tp-radio { display: flex; gap: 5px; flex-wrap: wrap; }\n    .tp-radio button {\n      flex: 1; min-width: 50px;\n      background: rgba(255,255,255,0.05);\n      border: 1px solid rgba(255,255,255,0.08);\n      border-radius: 8px; color: rgba(255,255,255,0.45);\n      font-size: 11px; font-weight: 500; padding: 7px 4px;\n      cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif;\n    }\n    .tp-radio button.active {\n      background: rgba(var(--accent-rgb), 0.14);\n      border-color: rgba(var(--accent-rgb), 0.35);\n      color: var(--accent);\n    }\n\n    /* Swatch row */\n    .tp-swatches { display: flex; gap: 7px; flex-wrap: wrap; }\n    .tp-swatch {\n      width: 28px; height: 28px; border-radius: 50%;\n      cursor: pointer; border: 2px solid transparent;\n      transition: transform 0.15s, border-color 0.15s;\n      flex-shrink: 0;\n    }\n    .tp-swatch:hover { transform: scale(1.15); }\n    .tp-swatch.active { border-color: #fff; }\n\n    /* Toggle */\n    .tp-toggle {\n      width: 36px; height: 20px; border-radius: 100px;\n      background: rgba(255,255,255,0.1); border: none; cursor: pointer;\n      position: relative; transition: background 0.2s; flex-shrink: 0;\n    }\n    .tp-toggle.on { background: var(--accent); }\n    .tp-toggle::after {\n      content: ''; position: absolute; top: 3px; left: 3px;\n      width: 14px; height: 14px; border-radius: 50%;\n      background: #fff; transition: transform 0.2s;\n    }\n    .tp-toggle.on::after { transform: translateX(16px); }\n\n    /* ─────────── CSS VARIABLES (all driven by JS) ─────────── */\n    :root {\n      --accent: #6ee7b7;\n      --accent-rgb: 110, 231, 183;\n      --accent-glow: rgba(110,231,183,0.35);\n      --accent-dim: rgba(110,231,183,0.10);\n      --accent-border: rgba(110,231,183,0.22);\n      --bg: #040404;\n      --bg-2: #0d0d0d;\n      --bg-3: #141414;\n      --border: rgba(255,255,255,0.08);\n      --text: #f0f0f0;\n      --text-muted: rgba(240,240,240,0.50);\n      --text-dim: rgba(240,240,240,0.28);\n      --font-display: 'Space Grotesk', sans-serif;\n      --font-body: 'Inter', sans-serif;\n      --radius: 16px;\n      --radius-sm: 10px;\n      --radius-pill: 100px;\n      --glow-size: 600px;\n      --glow-opacity: 0.06;\n      --density: 1;\n      --noise-opacity: 0;\n    }\n\n    /* ─────────── SHARED UI ─────────── */\n    .container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }\n\n    /* Nav */\n    .site-nav {\n      position: sticky; top: 0; z-index: 100;\n      border-bottom: 1px solid var(--border);\n      background: rgba(4,4,4,0.9);\n      backdrop-filter: blur(20px);\n    }\n    .nav-inner {\n      display: flex; align-items: center; justify-content: space-between;\n      padding: 18px 32px; max-width: 1200px; margin: 0 auto;\n    }\n    .logo { display: flex; align-items: center; gap: 10px; }\n    .logo-mark {\n      width: 30px; height: 30px; border-radius: 50%;\n      border: 2px solid rgba(255,255,255,0.75);\n      display: flex; align-items: center; justify-content: center;\n    }\n    .logo-mark-inner { width: 9px; height: 9px; border-radius: 50%; background: #fff; }\n    .logo-text { font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }\n    .logo-text em { color: var(--accent); font-style: normal; }\n    .nav-pill {\n      display: flex; align-items: center; gap: 2px;\n      background: rgba(0,0,0,0.5); border: 1px solid var(--border);\n      border-radius: var(--radius-pill); padding: 4px;\n    }\n    .nav-link {\n      font-size: 13px; font-weight: 500; color: var(--text-muted);\n      padding: 7px 15px; border-radius: var(--radius-pill);\n      transition: color 0.2s, background 0.2s;\n    }\n    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.07); }\n    .nav-link.active { color: #fff; background: rgba(255,255,255,0.09); }\n    .nav-cta {\n      font-size: 13px; font-weight: 600; color: #000;\n      background: var(--accent); padding: 7px 16px;\n      border-radius: var(--radius-pill); transition: background 0.2s;\n    }\n    .nav-cta:hover { background: #8ff0cb; }\n\n    /* Badge */\n    .badge {\n      display: inline-flex; align-items: center; gap: 8px;\n      background: var(--accent-dim); border: 1px solid var(--accent-border);\n      border-radius: var(--radius-pill); padding: 5px 14px 5px 9px;\n      font-size: 12px; font-weight: 500; color: var(--accent);\n    }\n    .badge .dot {\n      width: 6px; height: 6px; border-radius: 50%;\n      background: var(--accent); box-shadow: 0 0 7px var(--accent);\n    }\n\n    /* ─────────── HERO ─────────── */\n    .devlog-hero {\n      padding: calc(80px * var(--density)) 0 calc(64px * var(--density));\n      border-bottom: 1px solid var(--border);\n      position: relative; overflow: hidden;\n    }\n    .hero-glow {\n      position: absolute;\n      top: -160px; left: 50%; transform: translateX(-50%);\n      width: var(--glow-size); height: var(--glow-size); border-radius: 50%;\n      background: radial-gradient(circle, rgba(var(--accent-rgb), var(--glow-opacity)) 0%, transparent 65%);\n      pointer-events: none; transition: width 0.4s, height 0.4s, opacity 0.4s;\n    }\n    .noise-layer {\n      position: absolute; inset: 0; pointer-events: none; z-index: 1;\n      opacity: var(--noise-opacity);\n      background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n      background-size: 160px;\n    }\n\n    /* Shiny text */\n    @keyframes shine {\n      0%   { background-position: -200% center; }\n      100% { background-position: 200% center; }\n    }\n    .shiny {\n      background: linear-gradient(100deg, var(--accent) 0%, var(--accent) 30%, #fff 46%, rgba(var(--accent-rgb),0.7) 56%, var(--accent) 70%, var(--accent) 100%);\n      background-size: 200% auto;\n      -webkit-background-clip: text; background-clip: text;\n      -webkit-text-fill-color: transparent;\n      animation: shine 3.5s linear infinite;\n    }\n\n    /* Progress bar */\n    .progress-bar-outer {\n      background: var(--bg-3); border: 1px solid var(--border);\n      border-radius: var(--radius-pill); height: 8px; overflow: hidden;\n    }\n    .progress-bar-fill {\n      height: 100%; border-radius: var(--radius-pill);\n      background: linear-gradient(to right, var(--accent), rgba(var(--accent-rgb),0.6));\n      box-shadow: 0 0 12px var(--accent-glow);\n      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);\n    }\n\n    /* ─────────── PHASES ─────────── */\n    .phase-card {\n      background: var(--bg-2); border: 1px solid var(--border);\n      border-radius: var(--radius); padding: calc(20px * var(--density)) calc(22px * var(--density));\n      display: flex; gap: 16px; align-items: flex-start;\n      transition: border-color 0.2s, background 0.2s, transform 0.2s, border-radius 0.3s;\n    }\n    .phase-card:hover { border-color: var(--accent-border); transform: translateY(-2px); }\n    .phase-card.active { border-color: var(--accent-border); background: rgba(var(--accent-rgb), 0.04); }\n    .phase-card.done { opacity: var(--done-opacity, 0.72); }\n    .phase-card.upcoming { opacity: var(--upcoming-opacity, 0.45); }\n\n    /* Card style variants */\n    body.card-ghost .phase-card { background: transparent; }\n    body.card-glow .phase-card.active { box-shadow: 0 0 28px rgba(var(--accent-rgb),0.12); }\n    body.card-solid .phase-card { background: var(--bg-3); }\n\n    .phase-icon {\n      width: 40px; height: 40px; border-radius: 10px;\n      display: flex; align-items: center; justify-content: center;\n      font-size: 18px; flex-shrink: 0;\n      background: var(--bg-3); border: 1px solid var(--border);\n      transition: background 0.2s, border-radius 0.3s;\n    }\n    .phase-card.done .phase-icon { background: rgba(var(--accent-rgb),0.1); border-color: var(--accent-border); }\n    .phase-card.active .phase-icon { background: rgba(var(--accent-rgb),0.15); border-color: var(--accent-border); box-shadow: 0 0 14px rgba(var(--accent-rgb),0.2); }\n\n    .phase-num { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); }\n\n    .pill {\n      font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;\n      padding: 2px 8px; border-radius: var(--radius-pill);\n    }\n    .pill-done { background: rgba(var(--accent-rgb),0.12); color: var(--accent); border: 1px solid var(--accent-border); }\n    .pill-active { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); animation: pulse-pill 2s ease infinite; }\n    .pill-soon { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); }\n    @keyframes pulse-pill { 0%,100%{opacity:1} 50%{opacity:0.6} }\n\n    .phase-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 5px; }\n    .phase-desc { font-size: 12px; color: var(--text-muted); line-height: 1.65; }\n    .phase-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }\n    .phase-tasks { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }\n    .task-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); }\n    .task-check {\n      width: 15px; height: 15px; border-radius: 4px; flex-shrink: 0;\n      display: flex; align-items: center; justify-content: center; font-size: 9px;\n    }\n    .task-check.done  { background: rgba(var(--accent-rgb),0.15); color: var(--accent); }\n    .task-check.in-progress { background: rgba(251,191,36,0.12); color: #fbbf24; }\n    .task-check.todo  { background: rgba(255,255,255,0.05); color: var(--text-dim); }\n    .task-text.done   { text-decoration: line-through; opacity: 0.5; }\n\n    .phase-connector {\n      width: 2px; height: 18px;\n      background: linear-gradient(to bottom, var(--border), transparent);\n      margin: 0 0 0 19px;\n    }\n    .phase-connector.done { background: linear-gradient(to bottom, rgba(var(--accent-rgb),0.3), rgba(var(--accent-rgb),0.1)); }\n\n    /* ─────────── UPDATES ─────────── */\n    .updates-box { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }\n    .update-item { display: flex; gap: 14px; padding: 15px 20px; border-bottom: 1px solid var(--border); }\n    .update-item:last-child { border-bottom: none; }\n    .update-date { font-size: 11px; color: var(--text-dim); font-weight: 500; white-space: nowrap; min-width: 44px; padding-top: 2px; }\n    .update-tag {\n      font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;\n      padding: 2px 7px; border-radius: var(--radius-pill); white-space: nowrap; height: fit-content; margin-top: 2px;\n    }\n    .tag-shipped { background: rgba(var(--accent-rgb),0.12); color: var(--accent); border: 1px solid var(--accent-border); }\n    .tag-wip     { background: rgba(251,191,36,0.10); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }\n    .tag-fix     { background: rgba(239,68,68,0.10); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }\n    .tag-idea    { background: rgba(139,92,246,0.10); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }\n    .update-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; }\n    .update-text { font-size: 12px; color: var(--text-muted); line-height: 1.6; }\n\n    /* ─────────── STACK ─────────── */\n    .stack-pill {\n      display: inline-flex; align-items: center; gap: 6px;\n      background: var(--bg-2); border: 1px solid var(--border);\n      border-radius: var(--radius-sm); padding: 6px 12px;\n      font-size: 12px; font-weight: 500; color: var(--text-muted);\n      transition: border-color 0.2s, color 0.2s;\n    }\n    .stack-pill:hover { border-color: var(--accent-border); color: var(--accent); }\n\n    /* ─────────── CTA BOX ─────────── */\n    .cta-box {\n      background: var(--accent-dim); border: 1px solid var(--accent-border);\n      border-radius: var(--radius); padding: 26px 28px;\n    }\n    .cta-box h3 { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 7px; }\n    .cta-box p { font-size: 13px; color: var(--text-muted); line-height: 1.65; margin-bottom: 16px; }\n\n    .btn-primary {\n      display: inline-flex; align-items: center; gap: 8px;\n      background: var(--accent); color: #000;\n      font-size: 13px; font-weight: 600; padding: 10px 18px;\n      border-radius: var(--radius-pill); border: none; cursor: pointer;\n      transition: background 0.2s, transform 0.2s, box-shadow 0.2s; text-decoration: none;\n    }\n    .btn-primary:hover { background: #8ff0cb; transform: translateY(-1px); box-shadow: 0 0 24px var(--accent-glow); }\n    .btn-ghost {\n      display: inline-flex; align-items: center; gap: 8px;\n      background: transparent; color: var(--text-muted);\n      font-size: 13px; font-weight: 500; padding: 10px 18px;\n      border-radius: var(--radius-pill); border: 1px solid var(--border); cursor: pointer;\n      transition: color 0.2s, border-color 0.2s; text-decoration: none;\n    }\n    .btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.25); }\n\n    /* ─────────── FOOTER ─────────── */\n    .site-footer { border-top: 1px solid var(--border); padding: 44px 0; }\n    .footer-inner {\n      max-width: 1200px; margin: 0 auto; padding: 0 32px;\n      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;\n    }\n    .footer-link { font-size: 13px; color: var(--text-dim); transition: color 0.2s; }\n    .footer-link:hover { color: var(--accent); }\n    .footer-copy { font-size: 13px; color: var(--text-dim); }\n\n    /* ─────────── SECTION SPACING ─────────── */\n    .section { padding: calc(80px * var(--density)) 0; }\n    .label { font-size: 10px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: var(--text-dim); }\n\n    /* ─────────── FADE IN ─────────── */\n    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }\n    .fade { animation: fadeUp 0.7s ease both; }\n    .d1{animation-delay:.05s} .d2{animation-delay:.18s} .d3{animation-delay:.3s} .d4{animation-delay:.44s}\n\n    /* ─────────── LAYOUT VARIANTS ─────────── */\n    body.layout-single .main-grid { grid-template-columns: 1fr !important; }\n    body.layout-wide   .main-grid { grid-template-columns: 1.5fr 1fr !important; }\n\n    @media (max-width: 860px) {\n      .main-grid { grid-template-columns: 1fr !important; }\n      .nav-pill { display: none; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ── NAV ── -->\n<nav class=\"site-nav\">\n  <div class=\"nav-inner\">\n    <a href=\"index.html\" class=\"logo\">\n      <div class=\"logo-mark\"><div class=\"logo-mark-inner\"><\u002Fdiv><\u002Fdiv>\n      <span class=\"logo-text\">Team <em>Obsidian<\u002Fem> AI<\u002Fspan>\n    <\u002Fa>\n    <div class=\"nav-pill\">\n      <a href=\"index.html\" class=\"nav-link\">Home<\u002Fa>\n      <a href=\"web-design.html\" class=\"nav-link\">Web Design<\u002Fa>\n      <a href=\"links.html\" class=\"nav-link\">Links<\u002Fa>\n      <a href=\"devlog.html\" class=\"nav-link active\">Build Log<\u002Fa>\n      <a href=\"mailto:teamobsidianai2026@gmail.com\" class=\"nav-cta\">Contact →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ── HERO ── -->\n<section class=\"devlog-hero\" id=\"top\">\n  <div class=\"hero-glow\"><\u002Fdiv>\n  <div class=\"noise-layer\"><\u002Fdiv>\n  <div class=\"container\" style=\"position:relative;z-index:2;\">\n    <div class=\"badge fade d1\" style=\"margin-bottom: 22px; display: inline-flex;\">\n      <div class=\"dot\"><\u002Fdiv>\n      <span id=\"badge-text\">Building in Public · Updated April 2026<\u002Fspan>\n    <\u002Fdiv>\n    <h1 class=\"fade d2\" id=\"hero-headline\" style=\"font-family: var(--font-display); font-size: clamp(36px,5vw,64px); font-weight: 700; letter-spacing: -2.5px; line-height: 1; margin-bottom: 16px;\">\n      The Pipeline<br><span class=\"shiny\">Build Log.<\u002Fspan>\n    <\u002Fh1>\n    <p class=\"fade d3\" style=\"font-size: 15px; color: var(--text-muted); max-width: 480px; line-height: 1.75; margin-bottom: 36px;\">\n      A real-time look at where the AI video pipeline is at — what's shipped, what's in progress, and what's coming next.\n    <\u002Fp>\n    <div class=\"fade d4\" style=\"max-width: 480px;\">\n      <div style=\"display:flex; justify-content:space-between; margin-bottom:10px;\">\n        <span style=\"font-size:13px; font-weight:600; color:var(--text-muted);\">Overall Progress<\u002Fspan>\n        <span id=\"progress-label\" style=\"font-size:13px; font-weight:700; color:var(--accent);\">65%<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"progress-bar-outer\">\n        <div class=\"progress-bar-fill\" id=\"progress-fill\" style=\"width:65%;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:20px; margin-top:14px; flex-wrap:wrap;\">\n        <span style=\"font-size:12px; color:var(--text-d " step=\"1\" value=\"6\">\n    <\u002Fdiv>\n    <div class=\"tp-row\">\n      <div class=\"tp-label\">Glow Radius <span id=\"lbl-radius\">600px<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"sl-radius\" min=\"200\" max=\"1000\" step=\"50\" value=\"600\">\n    <\u002Fdiv>\n    <div class=\"tp-row\">\n      <div class=\"tp-label\">Border Radius <span id=\"lbl-brad\">16px<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"sl-brad\" min=\"4\" max=\"28\" step=\"2\" value=\"16\">\n    <\u002Fdiv>\n    <div class=\"tp-row\">\n      <div class=\"tp-label\">Noise Texture <span id=\"lbl-noise\">Off<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"sl-noise\" min=\"0\" max=\"8\" step=\"1\" value=\"0\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- OPACITY -->\n  <div class=\"tp-section\">\n    <div class=\"tp-section-label\">Phase Opacity<\u002Fdiv>\n    <div class=\"tp-row\">\n      <div class=\"tp-label\">Done phases <span id=\"lbl-done-op\">72%<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"sl-done-op\" min=\"30\" max=\"100\" step=\"5\" value=\"72\">\n    <\u002Fdiv>\n    <div class=\"tp-row\">\n      <div class=\"tp-label\">Upcoming phases <span id=\"lbl-upcoming-op\">45%<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"sl-upcoming-op\" min=\"15\" max=\"80\" step=\"5\" value=\"45\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SECTION VISIBILITY -->\n  <div class=\"tp-section\">\n    <div class=\"tp-section-label\">Show Sections<\u002Fdiv>\n    <div class=\"tp-row-inline\">\n      <span class=\"tp-label\" style=\"font-size:12px;\">Recent Updates<\u002Fspan>\n      <button class=\"tp-toggle on\" id=\"tog-updates\"><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"tp-row-inline\" style=\"margin-top:8px;\">\n      <span class=\"tp-label\" style=\"font-size:12px;\">Tech Stack<\u002Fspan>\n      <button class=\"tp-toggle on\" id=\"tog-stack\"><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"tp-row-inline\" style=\"margin-top:8px;\">\n      <span class=\"tp-label\" style=\"font-size:12px;\">Watch in Real Time<\u002Fspan>\n      <button class=\"tp-toggle on\" id=\"tog-cta\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SHINE SPEED -->\n  <div class=\"tp-section\">\n    <div class=\"tp-section-label\">Headline Shine<\u002Fdiv>\n    <div class=\"tp-row\">\n      <div class=\"tp-label\">Speed <span id=\"lbl-shine\">3.5s<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"sl-shine\" min=\"0.5\" max=\"10\" step=\"0.5\" value=\"3.5\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentColor\": \"6ee7b7\",\n  \"accentRgb\": \"110,231,183\",\n  \"bgTone\": \"060810,0e1420,161e2c\",\n  \"displayFont\": \"'DM Mono', monospace\",\n  \"cardStyle\": \"glow\",\n  \"layout\": \"single\",\n  \"progress\": 45,\n  \"density\": 0.6,\n  \"glowIntensity\": 18,\n  \"glowRadius\": 1000,\n  \"borderRadius\": 28,\n  \"noiseOpacity\": 8,\n  \"doneOpacity\": 100,\n  \"upcomingOpacity\": 80,\n  \"shineSpeed\": 4.5,\n  \"showUpdates\": true,\n  \"showStack\": true,\n  \"showCta\": true,\n  \"overlayOpacity\": 25,\n  \"headlineVariant\": \"automate\",\n  \"showStats\": true,\n  \"showTicker\": true\n}/*EDITMODE-END*/;\n\nconst root = document.documentElement;\nlet state = { ...TWEAK_DEFAULTS };\n\nfunction applyAll() {\n  const s = state;\n\n  // Accent\n  root.style.setProperty('--accent', `#${s.accentColor}`);\n  root.style.setProperty('--accent-rgb', s.accentRgb);\n  root.style.setProperty('--accent-glow', `rgba(${s.accentRgb},0.35)`);\n  root.style.setProperty('--accent-dim', `rgba(${s.accentRgb},0.10)`);\n  root.style.setProperty('--accent-border', `rgba(${s.accentRgb},0.22)`);\n\n  // BG\n  const [bg, bg2, bg3] = s.bgTone.split(',');\n  root.style.setProperty('--bg', `#${bg}`);\n  root.style.setProperty('--bg-2', `#${bg2}`);\n  root.style.setProperty('--bg-3', `#${bg3}`);\n\n  // Font\n  root.style.setProperty('--font-display', s.displayFont);\n\n  // Card style\n  document.body.classList.remove('card-ghost','card-glow','card-solid');\n  if (s.cardStyle !== 'default') document.body.classList.add(`card-${s.cardStyle}`);\n\n  // Layout\n  document.body.classList.remove('layout-single','layout-wide');\n  if (s.layout !== 'default') document.body.classList.add(`layout-${s.layout}`);\n\n  // Progress\n  document.getElementById('progress-fill').style.width = s.progress + '%';\n  document.getElementById('progress-label').textContent = s.progress + '%';\n\n  // Density\n  root.style.setProperty('--density', s.density);\n\n  // Glow\n  root.style.setProperty('--glow-opacity', (s.glowIntensity / 100).toFixed(3));\n  root.style.setProperty('--glow-size', s.glowRadius + 'px');\n\n  // Border radius\n  root.style.setProperty('--radius', s.borderRadius + 'px');\n  root.style.setProperty('--radius-sm', Math.round(s.borderRadius * 0.65) + 'px');\n\n  // Noise\n  root.style.setProperty('--noise-opacity', (s.noiseOpacity / 100).toFixed(3));\n\n  // Phase opacity\n  root.style.setProperty('--done-opacity', s.doneOpacity / 100);\n  root.style.setProperty('--upcoming-opacity', s.upcomingOpacity / 100);\n\n  // Shine\n  document.querySelectorAll('.shiny').forEach(el => {\n    el.style.animationDuration = s.shineSpeed + 's';\n  });\n\n  // Section visibility\n  const tv = (id, show) => {\n    const el = document.getElementById(id);\n    if (el) el.style.display = show ? '' : 'none';\n  };\n  tv('updates-section', s.showUpdates);\n  tv('stack-section', s.showStack);\n  tv('cta-section', s.showCta);\n}\n\nfunction syncUI() {\n  // Swatches\n  document.querySelectorAll('.tp-swatch').forEach(s => {\n    s.classList.toggle('active', s.dataset.color === state.accentColor);\n  });\n  // BG radio\n  document.querySelectorAll('#bg-radio button').forEach(b => {\n    b.classList.toggle('active', b.dataset.bg === state.bgTone);\n  });\n  // Font radio\n  document.querySelectorAll('#font-radio button').forEach(b => {\n    b.classList.toggle('active', b.dataset.font === state.displayFont);\n  });\n  // Card radio\n  document.querySelectorAll('#card-radio button').forEach(b => {\n    b.classList.toggle('active', b.dataset.card === state.cardStyle);\n  });\n  // Layout radio\n  document.querySelectorAll('#layout-radio button').forEach(b => {\n    b.classList.toggle('active', b.dataset.layout === state.layout);\n  });\n  // Sliders + labels\n  const setSl = (id, lblId, val, suffix) => {\n    const el = document.getElementById(id);\n    const lb = document.getElementById(lblId);\n    if (el) el.value = val;\n    if (lb) lb.textContent = val + suffix;\n  };\n  setSl('sl-progress',    'lbl-progress',     state.progress,         '%');\n  setSl('sl-density',     'lbl-density',       state.density.toFixed(1), '');\n  setSl('sl-glow',        'lbl-glow',          state.glowIntensity,    '%');\n  setSl('sl-radius',      'lbl-radius',        state.glowRadius,       'px');\n  setSl('sl-brad',        'lbl-brad',          state.borderRadius,     'px');\n  setSl('sl-noise',       'lbl-noise',         state.noiseOpacity === 0 ? 'Off' : state.noiseOpacity + '%', '');\n  setSl('sl-done-op',     'lbl-done-op',       state.doneOpacity,      '%');\n  setSl('sl-upcoming-op', 'lbl-upcoming-op',   state.upcomingOpacity,  '%');\n  setSl('sl-shine',       'lbl-shine',         state.shineSpeed,       's');\n  // Toggles\n  const setTog = (id, val) => {\n    const el = document.getElementById(id);\n    if (el) el.classList.toggle('on', val);\n  };\n  setTog('tog-updates', state.showUpdates);\n  setTog('tog-stack',   state.showStack);\n  setTog('tog-cta',     state.showCta);\n}\n\nfunction update(key, val) {\n  state[key] = val;\n  applyAll();\n  syncUI();\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');\n}\n\n// ── Wire up controls ──\n\n// Swatches\ndocument.querySelectorAll('.tp-swatch').forEach(sw => {\n  sw.addEventListener('click', () => {\n    update('accentColor', sw.dataset.color);\n    update('accentRgb', sw.dataset.rgb);\n  });\n});\n\n// BG radio\ndocument.querySelectorAll('#bg-radio button').forEach(b => {\n  b.addEventListener('click', () => update('bgTone', b.dataset.bg));\n});\n\n// Font radio\ndocument.querySelectorAll('#font-radio button').forEach(b => {\n  b.addEventListener('click', () => update('displayFont', b.dataset.font));\n});\n\n// Card radio\ndocument.querySelectorAll('#card-radio button').forEach(b => {\n  b.addEventListener('click', () => update('cardStyle', b.dataset.card));\n});\n\n// Layout radio\ndocument.querySelectorAll('#layout-radio button').forEach(b => {\n  b.addEventListener('click', () => update('layout', b.dataset.layout));\n});\n\n// Sliders\nconst sliders = [\n  ['sl-progress',    'lbl-progress',    'progress',        v => v + '%',            parseFloat],\n  ['sl-density',     'lbl-density',     'density',         v => parseFloat(v).toFixed(1), parseFloat],\n  ['sl-glow',        'lbl-glow',        'glowIntensity',   v => v + '%',            parseFloat],\n  ['sl-radius',      'lbl-radius',      'glowRadius',      v => v + 'px',           parseFloat],\n  ['sl-brad',        'lbl-brad',        'borderRadius',    v => v + 'px',           parseFloat],\n  ['sl-noise',       'lbl-noise',       'noiseOpacity',    v => v == 0 ? 'Off' : v+'%', parseFloat],\n  ['sl-done-op',     'lbl-done-op',     'doneOpacity',     v => v + '%',            parseFloat],\n  ['sl-upcoming-op', 'lbl-upcoming-op', 'upcomingOpacity', v => v + '%',            parseFloat],\n  ['sl-shine',       'lbl-shine',       'shineSpeed',      v => v + 's',            parseFloat],\n];\n\nsliders.forEach(([slId, lblId, key, fmt, cast]) => {\n  const el = document.getElementById(slId);\n  const lb = document.getElementById(lblId);\n  if (!el) return;\n  el.addEventListener('input', () => {\n    const val = cast(el.value);\n    if (lb) lb.textContent = fmt(el.value);\n    update(key, val);\n  });\n});\n\n// Toggles\n[['tog-updates','showUpdates'], ['tog-stack','showStack'], ['tog-cta','showCta']].forEach(([id, key]) => {\n  const el = document.getElementById(id);\n  if (!el) return;\n  el.addEventListener('click', () => update(key, !state[key]));\n});\n\n// Tweaks host protocol\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks-panel').classList.add('open');\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n// Init\napplyAll();\nsyncUI();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
